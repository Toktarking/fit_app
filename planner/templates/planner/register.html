{% extends "planner/base.html" %}

{% block content %}

<h2>Создать аккаунт</h2>

<div class="card">
    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">Зарегистрироваться</button>
    </form>
</div>

<div class="action-links">
    <a href="{% url 'login' %}">Уже есть аккаунт? Войти</a>
</div>

{% endblock %}
